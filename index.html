<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazil-faz | Welcome</title>
    <style>
        /* 1. Global Styles & Background */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
        }

        .main-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Romantic Background Placeholder - Replace the URL with your chosen image */
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                        url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&q=80&w=2070') no-repeat center center/cover;
        }

        /* 2. Glassmorphism UI Card */
        .welcome-card {
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px 80px;
            border-radius: 30px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            z-index: 2;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        p {
            font-weight: 300;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        /* 3. The Video Feed (Placeholder) */
        .video-preview {
            width: 300px;
            height: 180px;
            background: #000;
            border-radius: 15px;
            margin: 0 auto 30px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 4. Vertical Volume Slider */
        .volume-control {
            position: absolute;
            right: -60px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 6px;
            height: 150px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            border-radius: 5px;
            /* Rotate to make it vertical for browsers that don't support slider-vertical */
            writing-mode: bt-lr; 
            -webkit-appearance: slider-vertical;
        }

        /* Slider Thumb Styling */
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 105, 180, 0.8); /* Romantic glow */
        }

        /* 5. Buttons */
        .btn-call {
            background: #ff4b2b;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn-call:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 65, 108, 0.6);
        }

        .mute-label {
            font-size: 0.8rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="welcome-card">
            <h1>Fazil-faz</h1>
            <p>Ready to start your conversation?</p>

            <div class="video-preview">
                <video id="appVideo" autoplay loop muted>
                    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>

            <button class="btn-call" onclick="startCall()">Enter Room</button>

            <div class="volume-control">
                <span class="mute-label">Vol</span>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50">
                <span id="volPercentage">50%</span>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('appVideo');
        const slider = document.getElementById('volumeSlider');
        const volText = document.getElementById('volPercentage');

        // Note: Chrome often prevents auto-playing sound until user interacts.
        // Once the user clicks "Enter Room", we can unmute.

        slider.addEventListener('input', (e) => {
            const val = e.target.value;
            volText.innerText = val + "%";
            
            // Set volume (0.0 to 1.0)
            if (video) {
                video.muted = false; // Unmute if the user adjusts volume
                video.volume = val / 100;
            }
        });

        function startCall() {
            alert("Connecting to Fazil-faz servers...");
            // In a real app, this is where you'd trigger your WebRTC logic.
            video.muted = false;
        }
    </script>

</body>
</html>
