<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrom Pro - 540x540</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; touch-action: none; }
        .board-frame {
            padding: 15px;
            background: linear-gradient(145deg, #5d4a37, #2a1b12);
            border-radius: 8px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 5px solid #1e140d;
        }
        canvas { background: #e6c587; border-radius: 2px; box-shadow: inset 0 0 60px rgba(0,0,0,0.2); cursor: crosshair; }
        
        /* Slider Styling */
        .slider-container { width: 400px; margin-top: 25px; position: relative; }
        input[type=range] {
            width: 100%; -webkit-appearance: none; background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 12px; cursor: pointer; background: rgba(255, 255, 255, 0.1);
            border-radius: 10px; border: 1px solid #5d4a37;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 24px; width: 24px; border-radius: 50%; background: #fde68a;
            cursor: pointer; -webkit-appearance: none; margin-top: -7px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5); border: 2px solid #92400e;
        }
    </style>
</head>
<body>

    <div class="board-frame">
        <canvas id="carromBoard" width="540" height="540"></canvas>
    </div>

    <div class="slider-container">
        <input type="range" id="strikerSlider" min="100" max="440" value="270">
        <div class="text-center text-[10px] text-amber-500/50 font-bold tracking-widest mt-2 uppercase">Position Striker</div>
    </div>

    <script>
        const canvas = document.getElementById('carromBoard');
        const ctx = canvas.getContext('2d');
        const slider = document.getElementById('strikerSlider');

        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragEnd = { x: 0, y: 0 };
        const FRICTION = 0.985;
        const POCKET_RADIUS = 28;

        class Piece {
            constructor(x, y, radius, color, isStriker = false) {
                this.x = x; this.y = y;
                this.radius = radius;
                this.color = color;
                this.isStriker = isStriker;
                this.vx = 0; this.vy = 0;
            }

            draw() {
                ctx.save();
                ctx.shadowColor = "rgba(0,0,0,0.4)"; ctx.shadowBlur = 4; ctx.shadowOffsetY = 2;
                const grad = ctx.createRadialGradient(this.x - this.radius/3, this.y - this.radius/3, 2, this.x, this.y, this.radius);
                
                if(this.color === '#fff') { grad.addColorStop(0, '#ffffff'); grad.addColorStop(1, '#cccccc'); }
                else if(this.color === '#000') { grad.addColorStop(0, '#444444'); grad.addColorStop(1, '#000000'); }
                else if(this.color === 'red') { grad.addColorStop(0, '#ff4444'); grad.addColorStop(1, '#880000'); }
                else { grad.addColorStop(0, '#fde68a'); grad.addColorStop(1, '#92400e'); }
                
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
                
                // Shine
                ctx.shadowBlur = 0; ctx.fillStyle = "rgba(255,255,255,0.3)";
                ctx.beginPath(); ctx.ellipse(this.x - this.radius/2.5, this.y - this.radius/2.5, this.radius/3, this.radius/6, Math.PI/4, 0, Math.PI*2);
                ctx.fill(); ctx.restore();
            }

            update() {
                this.x += this.vx; this.y += this.vy;
                this.vx *= FRICTION; this.vy *= FRICTION;
                if(Math.abs(this.vx) < 0.1) this.vx = 0;
                if(Math.abs(this.vy) < 0.1) this.vy = 0;
            }
        }

        let pieces = [];
        let striker = new Piece(270, 435, 20, 'gold', true);

        function setupBoard() {
            pieces = [];
            const centerX = 270, centerY = 270, r = 13;
            pieces.push(new Piece(centerX, centerY, r, 'red'));
            for(let i=0; i<6; i++) {
                const angle = i * (Math.PI/3);
                pieces.push(new Piece(centerX + Math.cos(angle)*r*2.1, centerY + Math.sin(angle)*r*2.1, r, i%2===0?'#fff':'#000'));
            }
            for(let i=0; i<12; i++) {
                const angle = i * (Math.PI/6);
                let color = [0,2,3,5,6,8,9,11].includes(i) ? '#fff' : '#000';
                pieces.push(new Piece(centerX + Math.cos(angle)*r*4.1, centerY + Math.sin(angle)*r*4.1, r, color));
            }
        }

        function drawMarkings() {
            ctx.strokeStyle = "rgba(61, 43, 18, 0.3)";
            ctx.lineWidth = 1.5;
            ctx.strokeRect(35, 35, 470, 470); // Main boundary
            ctx.strokeRect(90, 420, 360, 30); // Striker baseline
            ctx.beginPath(); ctx.arc(270, 270, 55, 0, Math.PI*2); ctx.stroke(); // Center circle
            
            ctx.fillStyle = "#111"; // Pockets
            [{x:0,y:0},{x:540,y:0},{x:0,y:540},{x:540,y:540}].forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, POCKET_RADIUS, 0, Math.PI*2); ctx.fill();
            });
        }

        function animate() {
            ctx.clearRect(0, 0, 540, 540);
            drawMarkings();

            if (isDragging) {
                ctx.beginPath();
                ctx.moveTo(striker.x, striker.y);
                ctx.lineTo(striker.x - (dragEnd.x - dragStart.x), striker.y - (dragEnd.y - dragStart.y));
                ctx.strokeStyle = "rgba(255,255,255,0.7)";
                ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);
            }

            [...pieces, striker].forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        // Slider logic to move striker
        slider.addEventListener('input', (e) => {
            if (striker.vx === 0 && striker.vy === 0) {
                striker.x = parseInt(e.target.value);
            }
        });

        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            isDragging = true;
            dragStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            dragEnd = { ...dragStart };
        });

        canvas.addEventListener('mousemove', e => {
            if(isDragging) {
                const rect = canvas.getBoundingClientRect();
                dragEnd = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            }
        });

        window.addEventListener('mouseup', () => {
            if(isDragging) {
                striker.vx = (dragStart.x - dragEnd.x) * 0.12;
                striker.vy = (dragStart.y - dragEnd.y) * 0.12;
                isDragging = false;
            }
        });

        setupBoard();
        animate();
    </script>
</body>
</html>
